---
# Complete Ansible role-style example for installing nectar-cloudinit-crowdstrike
# Can be used in your image building pipeline
#
# Variables you can override:
#   crowdstrike_module_source: Local path, git URL, or PyPI package name
#   crowdstrike_module_version: Version/branch/tag to install
#   crowdstrike_verify_installation: Whether to verify after install (default: true)

- name: Install CrowdStrike cloud-init module for Nectar
  hosts: all
  become: true

  vars:
    # Installation source - choose one of these methods:

    # Method 1: Install from local directory (for airgapped builds)
    crowdstrike_module_source: "{{ playbook_dir }}/files/nectar-cloudinit-crowdstrike"

    # Method 2: Install from git repository
    # crowdstrike_module_source: "git+https://github.com/NectarCloud/nectar-cloudinit-crowdstrike.git"
    # crowdstrike_module_version: "main"  # or specific tag like "v1.0.0"

    # Method 3: Install from internal PyPI server
    # crowdstrike_module_source: "nectar-cloudinit-crowdstrike"
    # crowdstrike_module_version: "1.0.0"
    # crowdstrike_pypi_url: "https://pypi.internal.nectar.org.au/simple"

    # Verification settings
    crowdstrike_verify_installation: true

    # Python paths (adjust for your distro if needed)
    cloudinit_config_dir: "/usr/lib/python3/dist-packages/cloudinit/config"
    cloud_cfg_dir: "/etc/cloud/cloud.cfg.d"

  tasks:
    - name: Check OS family
      ansible.builtin.debug:
        msg: "Installing on {{ ansible_distribution }} {{ ansible_distribution_version }}"

    # Prerequisites
    - name: Install pip on Debian/Ubuntu
      ansible.builtin.apt:
        name: python3-pip
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Install pip on RHEL/CentOS
      ansible.builtin.yum:
        name: python3-pip
        state: present
      when: ansible_os_family == "RedHat"

    - name: Ensure cloud-init is installed
      ansible.builtin.package:
        name: cloud-init
        state: present

    - name: Get cloud-init version
      ansible.builtin.command: cloud-init --version
      register: cloudinit_version
      changed_when: false

    - name: Display cloud-init version
      ansible.builtin.debug:
        msg: "{{ cloudinit_version.stdout }}"

    # Installation methods
    - name: Install from local directory
      ansible.builtin.pip:
        name: "file://{{ crowdstrike_module_source }}"
        state: present
        executable: pip3
      when: crowdstrike_module_source is search('/')

    - name: Install from git repository
      ansible.builtin.pip:
        name: "{{ crowdstrike_module_source }}@{{ crowdstrike_module_version | default('main') }}"
        state: present
        executable: pip3
      when:
        - crowdstrike_module_source is search('git+')
        - crowdstrike_module_version is defined

    - name: Install from PyPI (internal or public)
      ansible.builtin.pip:
        name: "{{ crowdstrike_module_source }}"
        version: "{{ crowdstrike_module_version | default(omit) }}"
        state: present
        executable: pip3
        extra_args: "{{ '--index-url ' + crowdstrike_pypi_url if crowdstrike_pypi_url is defined else '' }}"
      when:
        - crowdstrike_module_source is not search('/')
        - crowdstrike_module_source is not search('git+')

    # Verification
    - name: Verify module installation
      when: crowdstrike_verify_installation | bool
      block:
        - name: Check module file exists
          ansible.builtin.stat:
            path: "{{ cloudinit_config_dir }}/cc_crowdstrike.py"
          register: module_file_stat

        - name: Check config file exists
          ansible.builtin.stat:
            path: "{{ cloud_cfg_dir }}/99_crowdstrike.cfg"
          register: config_file_stat

        - name: Assert module file installed
          ansible.builtin.assert:
            that:
              - module_file_stat.stat.exists
              - module_file_stat.stat.isreg
            fail_msg: "Module file not found at {{ cloudinit_config_dir }}/cc_crowdstrike.py"
            success_msg: "Module file found at {{ cloudinit_config_dir }}/cc_crowdstrike.py"

        - name: Assert config file installed
          ansible.builtin.assert:
            that:
              - config_file_stat.stat.exists
              - config_file_stat.stat.isreg
            fail_msg: "Config file not found at {{ cloud_cfg_dir }}/99_crowdstrike.cfg"
            success_msg: "Config file found at {{ cloud_cfg_dir }}/99_crowdstrike.cfg"

        - name: Test Python import
          ansible.builtin.command: >
            python3 -c "from cloudinit.config import cc_crowdstrike;
            print(cc_crowdstrike.meta['id'])"
          register: import_result
          changed_when: false
          failed_when: import_result.rc != 0 or 'cc_crowdstrike' not in import_result.stdout

        - name: Display module metadata
          ansible.builtin.debug:
            msg: "Successfully imported module: {{ import_result.stdout }}"

        - name: Verify module is registered in cloud-init
          ansible.builtin.shell: |
            grep -q "crowdstrike" {{ cloud_cfg_dir }}/99_crowdstrike.cfg
          register: module_registered
          changed_when: false
          failed_when: module_registered.rc != 0

    # Post-installation tasks
    - name: Display installation summary
      ansible.builtin.debug:
        msg:
          - "===== CrowdStrike Module Installation Complete ====="
          - "Module file: {{ cloudinit_config_dir }}/cc_crowdstrike.py"
          - "Config file: {{ cloud_cfg_dir }}/99_crowdstrike.cfg"
          - "Cloud-init version: {{ cloudinit_version.stdout }}"
          - ""
          - "Next steps:"
          - "1. Ensure nova-pollinate is configured on compute nodes"
          - "2. Ensure Vault contains secrets for each AZ"
          - "3. Test with: sudo cloud-init single --name crowdstrike --frequency always"

    # Optional: Clean up cloud-init state for image creation
    - name: Clean cloud-init state for golden image
      ansible.builtin.command: cloud-init clean --logs --seed
      when:
        - clean_cloudinit_state is defined
        - clean_cloudinit_state | bool
      tags:
        - never  # Only run when explicitly tagged
        - clean
