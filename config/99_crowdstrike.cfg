#cloud-config
# CrowdStrike Falcon Sensor Module Configuration
#
# This configuration file registers the CrowdStrike module with cloud-init.
# It should be installed to /etc/cloud/cloud.cfg.d/99_crowdstrike.cfg
#
# The module runs in the cloud_final_modules stage (after networking and
# package installation are complete) to ensure it can download and install
# the Falcon sensor.

# Register the crowdstrike module in the final stage
cloud_final_modules:
 - crowdstrike
