---
# Ansible tasks for installing nectar-cloudinit-crowdstrike module
# Include these tasks in your image building playbook

- name: Install nectar-cloudinit-crowdstrike module
  block:
    - name: Ensure pip is installed
      ansible.builtin.package:
        name: python3-pip
        state: present

    - name: Check if cloud-init is installed
      ansible.builtin.command: cloud-init --version
      register: cloudinit_check
      failed_when: false
      changed_when: false

    - name: Warn if cloud-init not found
      ansible.builtin.debug:
        msg: "WARNING: cloud-init not detected. The CrowdStrike module requires cloud-init."
      when: cloudinit_check.rc != 0

    - name: Install nectar-cloudinit-crowdstrike from local directory
      ansible.builtin.pip:
        name: "file://{{ playbook_dir }}/nectar-cloudinit-crowdstrike"
        state: present
        executable: pip3
      become: true

    # Alternative: Install from git repository
    # - name: Install nectar-cloudinit-crowdstrike from git
    #   ansible.builtin.pip:
    #     name: "git+https://github.com/NectarCloud/nectar-cloudinit-crowdstrike.git@main"
    #     state: present
    #     executable: pip3
    #   become: true

    - name: Verify module file was installed
      ansible.builtin.stat:
        path: /usr/lib/python3/dist-packages/cloudinit/config/cc_crowdstrike.py
      register: module_file

    - name: Fail if module not installed
      ansible.builtin.fail:
        msg: "CrowdStrike module file not found at expected location"
      when: not module_file.stat.exists

    - name: Verify config file was installed
      ansible.builtin.stat:
        path: /etc/cloud/cloud.cfg.d/99_crowdstrike.cfg
      register: config_file

    - name: Fail if config not installed
      ansible.builtin.fail:
        msg: "CrowdStrike config file not found at expected location"
      when: not config_file.stat.exists

    - name: Test module import
      ansible.builtin.command: python3 -c "from cloudinit.config import cc_crowdstrike; print('OK')"
      register: import_test
      changed_when: false

    - name: Display installation result
      ansible.builtin.debug:
        msg: "CrowdStrike cloud-init module installed successfully"
      when: import_test.stdout == "OK"

  tags:
    - crowdstrike
    - cloud-init
    - security
